<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Add Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4">

<h3 class="text-center mb-4">Add Job</h3>

<form th:action="@{/saveJob}" th:object="${job}" method="post">

<div class="mb-3">
<label class="form-label">Job Title</label>
<input type="text" th:field="*{jobTitle}" class="form-control" placeholder="Ex: Java Developer">
</div>

<div class="mb-3">
<label class="form-label">Company Name</label>
<input type="text" th:field="*{companyName}" class="form-control" placeholder="Ex: TCS">
</div>

<div class="mb-3">
<label class="form-label">Location</label>
<input type="text" th:field="*{location}" class="form-control" placeholder="Ex: Ahmedabad">
</div>

<div class="mb-3">
<label class="form-label">Salary (LPA)</label>
<input type="text" th:field="*{salary}" class="form-control" placeholder="Ex: 3 LPA">
</div>

<div class="mb-3">
<label class="form-label">Experience</label>
<input type="text" th:field="*{experience}" class="form-control" placeholder="Ex: 2 Years">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea th:field="*{description}" class="form-control" rows="3" placeholder="Enter job description"></textarea>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-primary">Save Job</button>
</div>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
