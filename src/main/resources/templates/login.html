<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Login</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card p-4 shadow">

<h3 class="text-center mb-4">Job Portal Login</h3>

<form th:action="@{/login}" th:object="${loginUser}" method="post">

<!-- Email -->
<div class="mb-3">
<label>Email</label>
<input type="email" th:field="*{email}" class="form-control">
<div class="text-danger" th:errors="*{email}"></div>
</div>

<!-- Password -->
<div class="mb-3">
<label>Password</label>
<div class="input-group">
<input type="password" th:field="*{password}" id="loginPassword" class="form-control">

<button class="btn btn-outline-secondary" type="button" onclick="toggleLoginPassword()">
<i class="bi bi-eye" id="loginEyeIcon"></i>
</button>
</div>
<div class="text-danger" th:errors="*{password}"></div>
</div>

<!-- Login error -->
<div class="text-danger mb-2" th:text="${error}"></div>

<button type="submit" class="btn btn-primary w-100">
Login
</button>

<div class="text-center mt-3">
<a href="/register">Create Account</a>
</div>

</form>

</div>
</div>
</div>
</div>

<!-- JavaScript -->
<script src="/js/login.js"></script>

</body>
</html>
