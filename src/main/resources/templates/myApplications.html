<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>My Applications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

.job-card{
transition:0.2s;
}

.job-card:hover{
transform:scale(1.02);
}

</style>

</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

<div th:replace="fragments/pageHeader :: pageHeader(
'My Applications',
'Track all the jobs you applied for'
)"></div>

<div class="row g-4">

<div class="col-md-6"
     th:each="app : ${applications}">

<div class="card shadow-sm job-card">

<div class="card-body">

<h5 th:text="${app.job.jobTitle}"></h5>

<p class="text-muted mb-2">
<i class="bi bi-building"></i>
<span th:text="${app.job.companyName}"></span>
</p>

<p class="mb-2">
<strong>Status:</strong>

<span class="badge bg-info"
      th:text="${app.status}">
</span>

</p>

<p class="mb-2">
<i class="bi bi-geo-alt"></i>
<span th:text="${app.job.location}"></span>
</p>

<p class="mb-2">
<i class="bi bi-calendar"></i>
Applied on:
<span th:text="${app.appliedDate}"></span>
</p>

<span class="badge bg-success">
Application Submitted
</span>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
