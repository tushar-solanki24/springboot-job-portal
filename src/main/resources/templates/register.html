<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Register</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body class="bg-light">

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card p-4 shadow">

<h3 class="text-center mb-4">Job Seeker Registration</h3>

<form th:action="@{/register}" th:object="${user}" method="post">

<!-- User name -->
<div class="mb-3">
<label class="form-label">User Name</label>
<input type="text" th:field="*{username}" class="form-control">
<div class="text-danger" th:errors="*{username}"></div>
</div>

<!-- Email -->
<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" th:field="*{email}" class="form-control">
<div class="text-danger" th:errors="*{email}"></div>
</div>

<!-- Password -->
<div class="mb-3">
<label>Password</label>

<div class="input-group">
<input type="password" th:field="*{password}" id="password" class="form-control">

<button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
<i class="bi bi-eye" id="eyeIcon"></i>
</button>
</div>

<div class="text-danger" th:errors="*{password}"></div>
</div>

<!-- Confirm Password -->
<div class="mb-3">
<label>Confirm Password</label>

<div class="input-group">
<input type="password" th:field="*{confirmPassword}" id="confirmPassword" class="form-control">

<button class="btn btn-outline-secondary" type="button" onclick="toggleConfirmPassword()">
<i class="bi bi-eye" id="confirmEyeIcon"></i>
</button>
</div>

<div id="passwordError" class="text-danger"></div>

</div>

<!-- Mobile -->
<div class="mb-3">
<label class="form-label">Mobile</label>
<input type="text" th:field="*{mobile}" class="form-control">
<div class="text-danger" th:errors="*{mobile}"></div>
</div>

<div class="mb-3">

<label class="form-label">Register As</label>

<select name="role" class="form-select">

<option value="JOBSEEKER">Job Seeker</option>
<option value="RECRUITER">Recruiter</option>

</select>

</div>

<button type="submit" class="btn btn-primary w-100">
Register
</button>

</form>

</div>
</div>
</div>
</div>

<!-- JavaScript -->
<script src="/js/register.js"></script>

</body>
</html>
