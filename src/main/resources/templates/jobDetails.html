<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Job Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

<div class="card shadow-sm">

<div class="card-body">

<h3 th:text="${job.jobTitle}"></h3>

<hr>

<p><strong>Company:</strong> <span th:text="${job.companyName}"></span></p>

<p><strong>Location:</strong> <span th:text="${job.location}"></span></p>

<p><strong>Salary:</strong> <span th:text="${job.salary}"></span></p>

<p><strong>Experience:</strong> <span th:text="${job.experience}"></span></p>

<hr>

<h5>Description</h5>

<p th:text="${job.description}"></p>

<a th:href="@{/applyJobPage/{id}(id=${job.jobId})}" class="btn btn-success">
Apply Job
</a>

<a href="/viewJobs" class="btn btn-secondary">
Back
</a>

</div>

</div>

</div>

</body>
</html>
