<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

.profile-card{
max-width:600px;
margin:auto;
}

.profile-img{
width:120px;
height:120px;
object-fit:cover;
border-radius:50%;
border:4px solid #0d6efd;
}

</style>

</head>

<body class="bg-light">


<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

<div class="card shadow profile-card">

<div class="card-body text-center">

<div th:replace="fragments/pageHeader :: pageHeader(
'My Profile',
'Manage your personal information and skills'
)"></div>

<!-- PROFILE IMAGE -->

<img th:src="${user.profileImage != null} ?
@{'/uploads/' + ${user.profileImage}} :
'https://cdn-icons-png.flaticon.com/512/149/149071.png'"
class="profile-img mb-3">

<h4 th:text="${user.username}"></h4>

<p class="text-muted">Job Seeker</p>

<hr>

<div class="row text-start">

<div class="col-md-6 mb-3">
<i class="bi bi-envelope"></i>
<strong>Email</strong>
<br>
<span th:text="${user.email}"></span>
</div>

<div class="col-md-6 mb-3">
<i class="bi bi-phone"></i>
<strong>Mobile</strong>
<br>
<span th:text="${user.mobile}"></span>
</div>

<div class="col-md-12 mb-3">
<i class="bi bi-tools"></i>
<strong>Skills</strong>
<br>
<span th:text="${user.skills}"></span>
</div>

</div>

<a href="/editProfile" class="btn btn-primary mt-3">
<i class="bi bi-pencil"></i> Edit Profile
</a>

</div>

</div>

</div>

</body>
</html>
