<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Saved Jobs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

<h3 class="mb-4">Saved Jobs</h3>

<div class="row g-4">

<div class="col-md-6"
     th:each="saved : ${savedJobs}">

<div class="card shadow-sm">

<div class="card-body">

<h5 th:text="${saved.job.jobTitle}"></h5>

<p th:text="${saved.job.companyName}"></p>

<p th:text="${saved.job.location}"></p>

<a th:href="@{/viewJob/{id}(id=${saved.job.jobId})}"
   class="btn btn-primary btn-sm">

View Details

</a>
<a th:href="@{/removeSavedJob/{id}(id=${saved.job.jobId})}"
   class="btn btn-danger btn-sm">
Remove
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
