<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

.dashboard-card{
transition:0.2s;
cursor:pointer;
}

.dashboard-card:hover{
transform:scale(1.03);
}

</style>

</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

<h3 class="mb-4">Dashboard</h3>

<div class="row g-4">

<!-- VIEW JOBS -->

<div class="col-md-4">
<a href="/viewJobs" class="text-decoration-none text-dark">
<div class="card shadow-sm dashboard-card">

<div class="card-body text-center">

<i class="bi bi-search fs-1 text-primary"></i>

<h5 class="mt-3">View Jobs</h5>

<p class="text-muted">Browse available jobs</p>

</div>

</div>
</a>
</div>

<!-- JOB SEEKER SECTION -->

<div class="col-md-4"
     th:if="${session.loggedUser.role == 'JOBSEEKER'}">

<a href="/myApplications" class="text-decoration-none text-dark">

<div class="card shadow-sm dashboard-card">

<div class="card-body text-center">

<i class="bi bi-file-earmark-text fs-1 text-success"></i>

<h5 class="mt-3">My Applications</h5>

<p class="text-muted">Track your job applications</p>

</div>

</div>

</a>

</div>

<div class="col-md-4"
     th:if="${session.loggedUser.role == 'JOBSEEKER'}">

<a href="/savedJobs" class="text-decoration-none text-dark">

<div class="card shadow-sm dashboard-card">

<div class="card-body text-center">

<i class="bi bi-heart fs-1 text-danger"></i>

<h5 class="mt-3">Saved Jobs</h5>

<p class="text-muted">Jobs you saved</p>

</div>

</div>

</a>

</div>

<!-- RECRUITER SECTION -->

<div class="col-md-4"
     th:if="${session.loggedUser.role == 'RECRUITER'}">

<a href="/addJob" class="text-decoration-none text-dark">

<div class="card shadow-sm dashboard-card">

<div class="card-body text-center">

<i class="bi bi-plus-circle fs-1 text-warning"></i>

<h5 class="mt-3">Add Job</h5>

<p class="text-muted">Post a new job</p>

</div>

</div>

</a>

</div>

<div class="col-md-4"
     th:if="${session.loggedUser.role == 'RECRUITER'}">

<a href="/myJobs" class="text-decoration-none text-dark">

<div class="card shadow-sm dashboard-card">

<div class="card-body text-center">

<i class="bi bi-briefcase fs-1 text-info"></i>

<h5 class="mt-3">My Jobs</h5>

<p class="text-muted">Manage posted jobs</p>

</div>

</div>

</a>

</div>

</div>

</div>

</body>
</html>
