<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Apply Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

<div class="card shadow-sm">

<div class="card-body">

<h3 th:text="${job.jobTitle}"></h3>

<p><strong>Company:</strong> <span th:text="${job.companyName}"></span></p>

<p><strong>Location:</strong> <span th:text="${job.location}"></span></p>

<hr>

<form th:action="@{/applyJob}" method="post" enctype="multipart/form-data">

<input type="hidden" name="jobId" th:value="${job.jobId}">

<div class="mb-3">

<label class="form-label">Upload Resume (PDF)</label>

<input type="file" name="resume" class="form-control" required>

</div>

<button class="btn btn-success">
Submit Application
</button>

</form>

</div>

</div>

</div>

</body>

</html>
